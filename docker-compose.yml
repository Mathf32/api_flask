services:

  postgres:
    image: postgres:12
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: api8inf349
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d api8inf349"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:5
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - FLASK_APP=inf349.py
      - FLASK_RUN_HOST=0.0.0.0
      - DB_HOST=postgres
      - DB_USER=user
      - DB_PASSWORD=pass
      - DB_NAME=api8inf349
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379
    command: sh -c "flask init-db && flask run"

  worker:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - FLASK_APP=inf349.py
      - DB_HOST=postgres
      - DB_USER=user
      - DB_PASSWORD=pass
      - DB_NAME=api8inf349
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379
    command: flask worker

volumes:
  postgres_data:
